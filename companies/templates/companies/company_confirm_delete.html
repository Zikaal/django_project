{% extends "base.html" %}
{% block title %}Удаление компании{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl">
  <div class="overflow-hidden rounded-3xl border border-rose-200 bg-white shadow-sm">
    <div class="border-b border-rose-100 px-4 py-5 sm:px-6">
      <h1 class="text-2xl font-bold text-slate-900">Удаление компании</h1>
    </div>

    <div class="space-y-6 px-4 py-6 sm:px-6">
      <p class="text-sm leading-6 text-slate-600">
        Вы уверены, что хотите удалить компанию
        <span class="font-semibold text-slate-900 break-words">"{{ object.name }}"</span>?
      </p>

      <form method="post" class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        {% csrf_token %}

        <a
          href="{% url 'company_list' %}"
          class="inline-flex w-full items-center justify-center rounded-2xl border border-slate-200 px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50 sm:w-auto"
        >
          Отмена
        </a>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-2xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-700 sm:w-auto"
        >
          Удалить
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
