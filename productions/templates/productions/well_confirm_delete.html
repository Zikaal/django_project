{% extends "base.html" %}

{% block title %}Удаление скважины{% endblock %}

{% block content %}
    <h1>Удаление скважины</h1>
    <p>Вы уверены, что хотите удалить скважину "{{ object.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Удалить</button>
        <a href="{% url 'well_list' %}">Отмена</a>
    </form>
{% endblock %}
