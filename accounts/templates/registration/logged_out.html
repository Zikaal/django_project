{% extends "base.html" %}

{% block title %}Выход{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl">
    <div class="rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm">
        <h1 class="text-2xl font-bold text-slate-900">Вы вышли из системы</h1>
        <p class="mt-3 text-sm text-slate-500">Спасибо за использование системы.</p>

        <div class="mt-6">
            <a
                href="{% url 'login' %}"
                class="inline-flex items-center rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700"
            >
                Войти снова
            </a>
        </div>
    </div>
</div>
{% endblock %}
